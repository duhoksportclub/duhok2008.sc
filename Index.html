<!DOCTYPE html>
<html>
<head>
    <title>Clicker Game</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .score { font-size: 50px; color: #ff4757; }
        .btn { padding: 20px 40px; font-size: 20px; background: #2ecc71; border: none; border-radius: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h1>DSC GAME</h1>
    <div class="score" id="score">0</div>
    <button class="btn" onclick="addPoint()">Click Me!</button>

    <script>
        let count = 0;
        function addPoint() {
            count++;
            document.getElementById('score').innerText = count;
        }
    </script>
</body>
</html>
