<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok SC - یاریێن بهێت</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #ffcc00;
            font-size: 26px;
            margin: 0;
        }
        .match-card {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
            position: relative;
        }
        .league-name {
            color: #0088ff;
            font-size: 13px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }
        .vs {
            color: #ffcc00;
            font-size: 14px;
            background: #222;
            padding: 5px 12px;
            border-radius: 10px;
        }
        .match-info {
            border-top: 1px solid #222;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #aaaaaa;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .info-label {
            color: #ffcc00;
            font-size: 11px;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>یاریێن یانەیا دهۆکێ</h1>
    </div>

    <!-- یارییا ١: خولا نایابا کوردستانێ -->
    <div class="match-card">
        <span class="league-name">خولا نایابا کوردستانێ</span>
        <div class="teams">
            <span>دهۆک</span>
            <span class="vs">VS</span>
            <span>ناڤێ تیپێ</span>
        </div>
        <div class="match-info">
            <div class="info-item">
                <span class="info-label">ڕۆژ</span>
                <span>ئەینی</span>
            </div>
            <div class="info-item">
                <span class="info-label">دەمژمێر</span>
                <span>4:00 PM</span>
            </div>
            <div class="info-item">
                <span class="info-label">بەروار</span>
                <span>2026/05/15</span>
            </div>
        </div>
    </div>

    <!-- یارییا ٢: خولا ستێرێن عیراقێ -->
    <div class="match-card">
        <span class="league-name">خولا ستێرێن عیراقێ</span>
        <div class="teams">
            <span>دهۆک</span>
            <span class="vs">VS</span>
            <span>ناڤێ تیپێ</span>
        </div>
        <div class="match-info">
            <div class="info-item">
                <span class="info-label">ڕۆژ</span>
                <span>سێشەمب</span>
            </div>
            <div class="info-item">
                <span class="info-label">دەمژمێر</span>
                <span>7:30 PM</span>
            </div>
            <div class="info-item">
                <span class="info-label">بەروار</span>
                <span>2026/05/19</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
