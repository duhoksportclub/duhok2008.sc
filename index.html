<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خولا نایابا کوردستانێ</title>
    <style>
        /* ل ڤێرێ تو دشێی ڕەنگان ب دلێ خۆ بگوهۆڕی */
        body {
            background-color: #0b111a; /* ڕەنگێ پاشبنەمایێ */
            color: white;
            font-family: sans-serif;
            margin: 0;
            text-align: center;
        }
        .header {
            background-color: #ffcc00; /* ڕەنگێ زەر یێ سەرەکی */
            padding: 20px;
            border-bottom: 5px solid #004a99;
        }
        .header h1 { color: #004a99; margin: 0; font-size: 24px; }
        
        .container { padding: 20px; }

        /* ستایلێ ئەو پشکا تو دشێی دەستکاریێ تێدا بکەی */
        .match-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffcc00;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* دوگمەیا ئەنجامان */
        .btn-link {
            display: block;
            background: #004a99;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>خولا نایابا کوردستانێ</h1>
</div>

<div class="container">
    
    <!-- ل ڤێرێ تو دشێی ناڤێ یارییان ب دەستێ خۆ بنڤێسی یان دەستکاری بکەی -->
    <div class="match-box">
        <h3 style="color: #ffcc00;">یاریێن بهێت یێن خولێ</h3>
        <p>دهۆک 🆚 زاخۆ</p>
        <p>هەولێر 🆚 نەورۆز</p>
        
        <!-- ئەڤ لێنکە چو جاران "Error" نادەت چونکی لێنکەکێ ڕاستەوخۆیە -->
        <a href="https://www.sofascore.com/tournament/football/iraq/kurdistan-premier-league/15383" target="_blank" class="btn-link">
            تەماشەکردنا خشتەیێ نوو یێ خولێ
        </a>
    </div>

</div>

</body>
</html>
