<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club</title>
    <style>
        /* دیزاینەکێ مۆدێرن و تۆخ */
        body { 
            background-color: #050a14; 
            color: white; 
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at top, #004a99 0%, #050a14 70%);
            min-height: 100vh;
        }
        header { 
            padding: 30px 10px;
            text-align: center;
        }
        .logo-text {
            font-size: 35px;
            font-weight: 900;
            color: #ffcc00; /* زەرا فەرمی */
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            margin: 0;
            letter-spacing: 1px;
        }
        .tagline {
            color: #ffffff;
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            margin: 10px;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            background: #ffcc00;
            color: #050a14;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            flex: 1;
            max-width: 150px;
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo-text">DUHOK SC</h1>
    <div class="tagline">duhok2008.sc • ئەنجامێن ڕاستەوخۆ</div>
</header>

<div class="main-card">
    <div class="btn-container">
        <div class="btn">خولا عیراقێ 🇮🇶</div>
        <div class="btn">یاریێن ئەڤڕۆ ⚽</div>
    </div>
    
    <iframe src="https://www.scoreaxis.com/widget/live-score?autoHeight=1&theme=dark" 
            width="100%" 
            height="650" 
            frameborder="0"
            style="border-radius: 15px;">
    </iframe>
</div>

</body>
</html>
