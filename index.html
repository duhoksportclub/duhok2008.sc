<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok SC 3D Edition</title>
    <style>
        :root {
            --dsc-blue: #003366;
            --dsc-yellow: #ffcc00;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            padding: 0;
            background: #0a0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            /* باکگراوندێ 3D Gradient */
            background: radial-gradient(circle at 50% 50%, #1a2a44 0%, #050a14 100%);
        }
        /* دروستکرنا کاریگەرییا 3D ل پشت نڤێسینێ */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 300px; height: 300px;
            background: var(--dsc-yellow);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            transform: translate(-50%, -50%);
        }
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo-3d {
            width: 100px;
            filter: drop-shadow(0 0 15px var(--dsc-yellow));
            animation: rotate3d 5s infinite linear;
        }
        @keyframes rotate3d {
            0% { transform: perspective(500px) rotateY(0deg); }
            100% { transform: perspective(500px) rotateY(360deg); }
        }
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            margin: 20px;
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
        }
        .btn-3d {
            display: block;
            background: linear-gradient(135deg, var(--dsc-blue), #0055aa);
            color: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 10px 0 #002244;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #002244;
        }
        .status-badge {
            display: inline-block;
            background: #ffcc00;
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Flag_of_Kurdistan.svg/1200px-Flag_of_Kurdistan.svg.png" class="logo-3d">
    <h1 style="color: var(--dsc-yellow); font-size: 32px; margin: 10px 0;">DUHOK SC</h1>
    <p style="opacity: 0.7;">Official 3D Experience</p>
</header>

<div class="main-card">
    <div class="status-badge">LIVE UPDATES</div>
    <h2 style="margin-top: 0;">یاریێن بهێت و ئەنجام</h2>
    
    <a href="https://www.sofascore.com/team/football/duhok-sc/42694" target="_blank" class="btn-3d">
        🇮🇶 یاریێن دهۆکێ (عیراق)
    </a>

    <a href="https://www.sofascore.com/tournament/football/iraq/kurdistan-premier-league/15383" target="_blank" class="btn-3d">
        ☀️ خولا نایابا کوردستانێ
    </a>

    <p style="font-size: 13px; opacity: 0.6; line-height: 1.6;">
        برا، ئەڤ شێوازە ب چ شێوەیان ناهێتە بلۆک کرن چونکی ڕاستەوخۆ تە دباتە ناڤ ئەنجامان ب کوالتییا بلند.
    </p>
</div>

<div style="padding: 30px; font-size: 12px; opacity: 0.4;">
    DESIGNED FOR DUHOK2008.SC
</div>

</body>
</html>
