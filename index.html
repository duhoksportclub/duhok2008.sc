<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Premier League</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #ffcc00;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .match-card {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #222;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .league-title {
            color: #0088ff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .vs {
            color: #ffcc00;
            font-size: 14px;
            background: #222;
            padding: 5px 10px;
            border-radius: 10px;
        }
        .btn-live {
            display: block;
            width: 100%;
            background: #ffcc00;
            color: #000;
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>خولا نایاب</h1>
    </div>

    <!-- پشکا یارییان: تو دشێی ل ڤێرە ناڤان بگوهۆڕی -->
    <div class="match-card">
        <span class="league-title">خولا نایابا کوردستانێ</span>
        <div class="teams">
            <span>دهۆک</span>
            <span class="vs">VS</span>
            <span>زاخۆ</span>
        </div>
    </div>

    <div class="match-card">
        <span class="league-title">خولا ستێرێن عیراقێ</span>
        <div class="teams">
            <span>دهۆک</span>
            <span class="vs">VS</span>
            <span>القوة الجوية</span>
        </div>
    </div>

    <!-- دوگمەیا ئەنجامێن ڕاستەوخۆ -->
    <a href="https://www.sofascore.com/tournament/football/iraq/kurdistan-premier-league/15383" class="btn-live">تەماشەکردنا ئەنجامێن نوو</a>
</div>

</body>
</html>
