<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSC - Official App</title>
    <style>
        :root {
            --gold: #ffcc00;
            --blue: #004a99;
            --dark: #050a14;
        }
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            /* باکگراوندەکێ 3D وەک ئاڵایی دناڤبەر شین و زەر دا */
            background: radial-gradient(circle at top right, rgba(0,74,153,0.5), transparent),
                        radial-gradient(circle at bottom left, rgba(255,204,0,0.3), transparent),
                        linear-gradient(135deg, #050a14 0%, #0a1221 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        header {
            padding: 30px 15px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
        }
        .flag-3d {
            width: 120px;
            filter: drop-shadow(0 0 15px var(--gold));
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .main-title { font-size: 30px; font-weight: 900; color: var(--gold); margin: 0; }
        
        .nav-tabs {
            display: flex;
            overflow-x: auto;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            gap: 10px;
            position: sticky;
            top: 0; z-index: 100;
        }
        .tab {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 12px;
            white-space: nowrap;
            font-size: 13px;
            border: 1px solid rgba(255,204,0,0.3);
            color: var(--gold);
        }

        .section-card {
            margin: 15px;
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .card-header {
            background: var(--blue);
            color: white;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        iframe { width: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Flag_of_Kurdistan.svg/1200px-Flag_of_Kurdistan.svg.png" class="flag-3d">
    <h1 class="main-title">DUHOK SPORT CLUB</h1>
    <p style="margin:5px; opacity:0.8;">ئەپلیکەیشنا فەرمی یا یانەیا دهۆکێ</p>
</header>

<div class="nav-tabs">
    <div class="tab">☀️ خولا کوردستانێ</div>
    <div class="tab">🇮🇶 خولا ستێرێن عیراقێ</div>
    <div class="tab">📅 یاریێن بهێت</div>
    <div class="tab">⚽ ئەنجامێن جیهانی</div>
</div>

<div class="section-card">
    <div class="card-header">
        <span>خولا نایابا کوردستانێ u ستێرێن عیراقێ</span>
        <span>LIVE</span>
    </div>
    <!-- لێرە ئەنجامێن هەمی یارییان ب شێوازەکێ نووی دێ دیار بن -->
    <iframe src="https://www.scoreaxis.com/widget/live-score?autoHeight=1&theme=light&font=Verdana" height="600"></iframe>
</div>

<div class="section-card">
    <div class="card-header">
        <span>خشتەیێ ڕێزبەندیێ (Standings)</span>
    </div>
    <iframe src="https://www.scoreaxis.com/widget/league-standings/854?autoHeight=1&theme=light" height="500"></iframe>
</div>

<div class="section-card">
    <div class="card-header">
        <span>یاریێن پاشەڕۆژێ (Upcoming)</span>
    </div>
    <iframe src="https://www.scoreaxis.com/widget/next-matches?autoHeight=1&theme=light" height="400"></iframe>
</div>

<footer style="text-align:center; padding:20px; opacity:0.5; font-size:12px;">
    Designed for duhok2008.sc
</footer>

</body>
</html>
