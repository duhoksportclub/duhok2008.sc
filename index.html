<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club</title>
    <style>
        :root {
            --main-blue: #003366;
            --main-yellow: #ffcc00;
            --dark-bg: #05070a;
            --card-bg: #10141d;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .navbar {
            width: 100%;
            background: var(--main-blue);
            padding: 20px 0;
            text-align: center;
            border-bottom: 4px solid var(--main-yellow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar h1 {
            margin: 0;
            font-size: 22px;
            color: var(--main-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .container {
            width: 90%;
            max-width: 450px;
            margin-top: 20px;
        }
        .league-header {
            background: linear-gradient(to left, var(--main-blue), transparent);
            padding: 10px 15px;
            border-right: 4px solid var(--main-yellow);
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        .match-card {
            background: var(--card-bg);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #1f2633;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .match-top {
            background: rgba(255, 204, 0, 0.05);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--main-yellow);
            border-bottom: 1px solid #1f2633;
        }
        .match-content {
            padding: 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }
        .team-name {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }
        .vs-box {
            background: var(--main-blue);
            color: var(--main-yellow);
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid var(--main-yellow);
        }
        .match-footer {
            padding: 10px;
            text-align: center;
            background: #0d1117;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>DUHOK SPORT CLUB</h1>
</div>

<div class="container">
    <div class="league-header">خولا ستێرێن عیراقێ</div>

    <!-- یارییا ١ (ڤێ پشکێ کۆپی بکە بۆ هەر یارییەکێ) -->
    <div class="match-card">
        <div class="match-top">
            <span>گەڕا ١</span>
            <span>2026/05/20 | 5:00 PM</span>
        </div>
        <div class="match-content">
            <div class="team">
                <div class="team-name">دهۆک</div>
            </div>
            <div class="vs-box">VS</div>
            <div class="team">
                <div class="team-name">ناڤێ تیپێ</div>
            </div>
        </div>
        <div class="match-footer">
            یاریگەها دهۆک یا نێودەوڵەتی
        </div>
    </div>

</div>

</body>
</html>
