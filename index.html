<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club</title>
    <style>
        /* دیزاینەکێ سادە و ب هێز ب ڕەنگێن یانەیا دهۆکێ */
        body { 
            background-color: #003366; /* شینێ یانەیا دهۆکێ */
            color: white; 
            font-family: 'Arial', sans-serif;
            text-align: center; 
            margin: 0;
            padding: 0;
        }
        header { 
            background-color: #ffcc00; /* زەرەکێ جوان */
            padding: 25px; 
            border-bottom: 6px solid #ffffff;
        }
        header h1 { 
            color: #003366; 
            margin: 0; 
            font-size: 30px; 
            font-weight: 900;
        }
        .app-title {
            color: #003366;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        .widget-container { 
            padding: 10px;
            margin-top: 15px;
        }
        iframe {
            border-radius: 12px;
            background: white;
        }
    </style>
</head>
<body>

<header>
    <h1>DUHOK SPORT CLUB</h1>
    <div class="app-title">duhok2008.sc</div>
</header>

<div class="widget-container">
    <!-- ئەنجامێن یارییان ب شێوەیەکێ پاقژ -->
    <iframe src="https://www.scoreaxis.com/widget/live-score?autoHeight=1&theme=dark" 
            width="100%" 
            height="750" 
            frameborder="0">
    </iframe>
</div>

</body>
</html>
