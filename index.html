<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خولا ستێرێن عیراقێ</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #ffcc00;
            font-size: 26px;
            margin: 0;
        }
        .match-card {
            background: #111;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #0088ff;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .vs {
            color: #ffcc00;
            font-size: 12px;
            background: #222;
            padding: 4px 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>خولا ستێرێن عیراقێ</h1>
    </div>

    <!-- یارییا 1 (تو دشێی ڤێ پشکێ کۆپی بکەی و دانی دا ببیتە 39 یاری) -->
    <div class="match-card">
        <div class="match-header">
            <span>گەڕا 1</span>
            <span>2026/05/05 - 5:00 PM</span>
        </div>
        <div class="teams">
            <span>دهۆک</span>
            <span class="vs">VS</span>
            <span>ناڤێ تیپێ</span>
        </div>
    </div>

    <!-- یارییا 2 -->
    <div class="match-card">
        <div class="match-header">
            <span>گەڕا 2</span>
            <span>2026/05/05 - 5:30 PM</span>
        </div>
        <div class="teams">
            <span>دهۆک</span>
            <span class="vs">VS</span>
            <span></span>NAFT MAYSAN</span>
        </div>
    </div>

</div>

</body>
</html>
<div class="match-card">
    <div class="match-header">
        <span>گەڕا (33)</span>
        <span>بەروار و دەمژمێر</span>
    </div>
    <div class="teams">
        <span>دهۆک</span>
        <span class="vs">VS</span>
        <span>تیپا بەرامبەر</span>
    </div>
</div>
