<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok SC - یاریێن بهێت</title>
    <style>
        body { 
            background-color: #050a14; /* باکگراوندێ تۆخ و مۆدێرن */
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            text-align: center;
        }
        .header { 
            background: #ffcc00; 
            padding: 20px; 
            border-bottom: 4px solid #004a99;
        }
        .header img { width: 60px; margin-bottom: 10px; }
        .header h1 { color: #004a99; margin: 0; font-size: 22px; }

        .section {
            margin: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }
        .section-title {
            color: #ffcc00;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-right: 4px solid #ffcc00;
            padding-right: 10px;
            text-align: right;
        }
        /* ستایلێ یارییێن بهێت */
        .match-card {
            background: #004a99;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-name { font-weight: bold; font-size: 14px; }
        .vs { color: #ffcc00; font-weight: 900; }

        iframe { width: 100%; height: 500px; border-radius: 15px; border: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Flag_of_Kurdistan.svg/1200px-Flag_of_Kurdistan.svg.png">
    <h1>DUHOK SPORT CLUB</h1>
</div>

<div class="section">
    <div class="section-title">یاریێن بهێت یێن دهۆکێ (ستێرێن عیراقێ)</div>
    <!-- ژبەر کو وێجێت یاریێن دهۆکێ ب تەنێ نیشان نادەن، من ئەڤە ب دەستێ خۆ بۆ تە ڕێکخست -->
    <div class="match-card">
        <span class="team-name">دهۆک</span>
        <span class="vs">VS</span>
        <span class="team-name">یارییا بهێت</span>
    </div>
    <p style="font-size: 12px; opacity: 0.7;">بۆ دیتنا خشتەیێ گشتی یێ خولێ، تەماشەی خوارێ بکە:</p>
    <iframe src="https://www.scoreaxis.com/widget/next-matches/854?autoHeight=1&theme=dark"></iframe>
</div>

<div class="section">
    <div class="section-title">خولا نایابا کوردستانێ</div>
    <!-- ئەڤ وێجێتە یاریێن کوردستانێ نیشان ددەت ئەگەر هەبن -->
    <iframe src="https://ls.betradar.com/ls/widgets/?/bet365/en/page/widgets_lmts#widget/matchtoday" style="height: 600px;"></iframe>
</div>

</body>
</html>
