<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club - Official</title>
    <style>
        :root {
            --dsc-blue: #003366;
            --dsc-yellow: #ffcc00;
            --dsc-dark: #050a14;
        }
        body {
            background-color: var(--dsc-dark);
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            width: 100%;
            background-color: var(--dsc-blue);
            padding: 30px 0;
            text-align: center;
            border-bottom: 4px solid var(--dsc-yellow);
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--dsc-yellow);
            letter-spacing: 2px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            flex-grow: 1;
        }
        .league-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
            border: 1px solid var(--dsc-yellow);
            padding: 10px;
            border-radius: 10px;
        }
        .match-card {
            background: #101826;
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 20px;
            border: 1px solid #1f2633;
            position: relative;
            text-align: center;
        }
        .match-card::after {
            content: "";
            position: absolute;
            top: 15%; right: 0;
            width: 4px; height: 70%;
            background: var(--dsc-yellow);
            border-radius: 2px;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--dsc-yellow);
            margin-bottom: 15px;
            font-weight: bold;
        }
        .teams {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .vs-text {
            color: var(--dsc-yellow);
            font-size: 18px;
        }
        .stadium {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .footer {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
        }
        .official-tag {
            color: var(--dsc-yellow);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .tiktok-id {
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>DUHOK SPORT CLUB</h1>
</div>

<div class="container">
    <div class="league-title">خولا ستێرێن عیراقێ</div>

    <div class="match-card">
        <div class="match-header">
            <span>2026/05/05 | 5:30</span>
            <span>گەڕا (33)</span>
        </div>
        <div class="teams">
            <span>DUHOK</span>
            <span class="vs-text">VS</span>
            <span>NAFT MISSAN</span>
        </div>
        <div class="stadium">
                  DUHOK STADIUM
        </div>
    </div>
</div>

<div class="footer">
    <div class="official-tag">OFFICIAL PRODUCT</div>
    <div class="tiktok-id">TIK: duhok2008.sc</div>
</div>

</body>
</html>

    </div>
    <div class="teams">
        <span>DUHOK</span> <!-- ناڤێ تیپا ئێکێ -->
        <span class="vs-text">VS</span>
        <span>AL QASIM</span> <!-- ناڤێ تیپا دووێ -->
    </div>
    <div class="stadium">

    </div>
</div>
