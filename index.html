<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club - Official</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            /* باکگراوندەکێ 3D یێ ئاڵایێ کوردستانێ کو هەمی شاشێ دگریت */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Flag_of_Kurdistan.svg/1200px-Flag_of_Kurdistan.svg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
        }
        header {
            padding: 40px 20px;
            background: rgba(255, 204, 0, 0.9);
            border-bottom: 5px solid #004a99;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .main-title {
            color: #004a99;
            font-size: 35px;
            font-weight: 900;
            margin: 0;
            text-shadow: 1px 1px 2px white;
        }
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .btn {
            background: #004a99;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #ffcc00;
            font-size: 14px;
        }
        .content-card {
            background: rgba(255, 255, 255, 0.95);
            margin: 20px auto;
            max-width: 95%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 4px solid #ffcc00;
        }
        .card-header {
            background: #004a99;
            color: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <h1 class="main-title">DUHOK SPORT CLUB</h1>
    <div style="color: #004a99; font-weight: bold;">duhok2008.sc</div>
</header>

<div class="nav-container">
    <div class="btn">☀️ خولا کوردستانێ</div>
    <div class="btn">🇮🇶 خولا عیراقێ</div>
    <div class="btn">⚽ یاریێن ئەڤڕۆ</div>
</div>

<div class="content-card">
    <div class="card-header">ئەنجامێن ڕاستەوخۆ (LIVE SCORES)</div>
    <!-- ئەڤ لێنکە یێ باوەرپێکرییە و چ جاران "Outdated" نابیت -->
    <iframe src="https://ls.betradar.com/ls/widgets/?/bet365/en/page/widgets_lmts#widget/matchtoday"></iframe>
</div>

<div style="padding: 20px; opacity: 0.8; font-size: 12px;">
    © 2026 Duhok Sport Club App
</div>

</body>
</html>
