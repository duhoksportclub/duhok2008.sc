<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club</title>
    <style>
        body { 
            background: linear-gradient(180deg, #004a99 0%, #ffcc00 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            text-align: center; 
            margin: 0;
            min-height: 100vh;
            background-attachment: fixed;
            scroll-behavior: smooth;
        }
        header { 
            background-color: rgba(255, 204, 0, 0.95); 
            padding: 20px; 
            border-bottom: 5px solid #004a99;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .flag-icon {
            width: 70px;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        header h1 { color: #004a99; margin: 0; font-size: 24px; }

        .nav-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
        }
        .btn {
            background: #004a99;
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border: 2px solid white;
            cursor: pointer;
        }
        .btn:active { background: #ffcc00; color: #004a99; }

        .section {
            padding: 10px;
            margin: 20px auto;
            max-width: 95%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .section-title {
            background: #004a99;
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        iframe { width: 100%; height: 600px; border: none; }
    </style>
</head>
<body>

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Flag_of_Kurdistan.svg/1200px-Flag_of_Kurdistan.svg.png" class="flag-icon">
    <h1>DUHOK SPORT CLUB</h1>
</header>

<div class="nav-container">
    <a href="#kurdistan" class="btn">☀️ خولا کوردستانێ</a>
    <a href="#iraq" class="btn">🇮🇶 خولا عیراقێ</a>
    <a href="#world" class="btn">⚽ یاریێن جیهانی</a>
</div>

<div id="kurdistan" class="section">
    <div class="section-title">ئەنجامێن خولا نایابا کوردستانێ</div>
    <!-- ژبەر کو لێنکەکێ جودا بۆ کوردستانێ نینە، ئەڤە هەمی ئەنجامان نیشان دەت -->
    <iframe src="https://ls.betradar.com/ls/widgets/?/bet365/en/page/widgets_lmts#widget/matchtoday"></iframe>
</div>

<div id="iraq" class="section">
    <div class="section-title">ڕێزبەندیا خولا ستێرێن عیراقێ</div>
    <iframe src="https://www.scoreaxis.com/widget/league-standings/854?autoHeight=1&theme=light"></iframe>
</div>

<div id="world" class="section">
    <div class="section-title">یاریێن جیهانی یێن ئەڤڕۆ</div>
    <iframe src="https://www.scoreaxis.com/widget/live-score?autoHeight=1&theme=light"></iframe>
</div>

</body>
</html>
