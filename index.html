<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7691244651351215" crossorigin="anonymous"></script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhok Sport Club</title>
    <style>
        :root { --dsc-blue: #003366; --dsc-yellow: #ffcc00; --dsc-dark: #050a14; }
        body { background-color: var(--dsc-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background-color: var(--dsc-blue); padding: 30px 0; text-align: center; border-bottom: 4px solid var(--dsc-yellow); }
        .header h1 { margin: 0; font-size: 28px; color: var(--dsc-yellow); letter-spacing: 2px; }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        .league-title { text-align: center; font-size: 18px; margin-bottom: 25px; border: 1px solid var(--dsc-yellow); padding: 10px; border-radius: 10px; }
        .match-card { background: #101826; border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; border: 1px solid #1f2633; position: relative; text-align: center; }
        .match-card::after { content: ""; position: absolute; top: 15%; right: 0; width: 4px; height: 70%; background: var(--dsc-yellow); border-radius: 2px; }
        .match-header { display: flex; justify-content: space-between; font-size: 14px; color: var(--dsc-yellow); margin-bottom: 15px; font-weight: bold; }
        .teams { font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; }
        .vs-text { color: var(--dsc-yellow); font-size: 16px; }
        .stadium { margin-top: 12px; font-size: 13px; color: #888; letter-spacing: 1px; }
        .footer { margin-top: 30px; text-align: center; padding-bottom: 40px; }
        .official-tag { color: var(--dsc-yellow); font-size: 15px; font-weight: bold; }
        .tiktok-id { display: block; margin-top: 5px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">
    <h1>DUHOK SPORT CLUB</h1>
</div>

<div class="container">
    <div class="league-title">خولا ستێرێن عیراقێ</div>

    <div class="match-card">
        <div class="match-header">
            <span>2026/05/05 | 5:30</span>
            <span>گەڕا (33)</span>
        </div>
        <div class="teams">
            <span>NAFT MISSAN</span>
            <span class="vs-text">VS</span>
            <span>DUHOK</span>
        </div>
        <div class="stadium">📍 یاریگەها دهۆک یا نێودەوڵەتی</div>
    </div>

    <div class="match-card">
        <div class="match-header">
            <span>2026/10/05 | 5:30</span>
            <span>گەڕا (34)</span>
        </div>
        <div class="teams">
            <span>AL QASIM</span>
            <span class="vs-text">VS</span>
            <span>DUHOK</span>
        </div>
        <div class="stadium">📍 یاریگەها دهۆک یا نێودەوڵەتی</div>
    </div>

    <div class="footer">
        <div class="official-tag">OFFICIAL PRODUCT</div>
        <div class="tiktok-id">TIK: duhok2008.sc</div>
    </div>
</div>

</body>
</html>
